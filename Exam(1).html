<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能题库练习系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fa; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 3px 15px rgba(0,0,0,0.1); padding: 30px; }
        h1 { color: #2c3e50; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #7f8c8d; text-align: center; margin-bottom: 30px; }
        
        /* 导入区域 */
        .import-area { background: #f8f9fa; padding: 25px; border-radius: 8px; margin-bottom: 30px; border-left: 4px solid #3498db; }
        .format-guide { background: #fffde7; border: 1px solid #ffeb3b; border-radius: 6px; padding: 15px; margin-bottom: 20px; }
        .format-guide h3 { color: #f39c12; margin-bottom: 10px; }
        
        textarea { width: 100%; height: 200px; padding: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; line-height: 1.6; margin-bottom: 15px; resize: vertical; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; margin: 5px; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #ecf0f1; color: #34495e; }
        .btn-secondary:hover { background: #d5dbdb; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        
        /* 练习区域 */
        .practice-area { display: none; }
        .stats { display: flex; justify-content: space-between; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .stat-item { text-align: center; flex: 1; }
        .stat-value { font-size: 24px; font-weight: bold; color: #3498db; }
        .stat-label { font-size: 12px; color: #7f8c8d; margin-top: 5px; }
        
        .question-box { background: white; border: 1px solid #eee; border-radius: 8px; padding: 25px; margin-bottom: 20px; }
        .question-header { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .question-number { font-weight: bold; color: #3498db; }
        .question-type { background: #e74c3c; color: white; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .question-type.single { background: #3498db; }
        .question-type.truefalse { background: #f39c12; }
        
        .options { margin-bottom: 20px; }
        .option { padding: 12px 15px; margin-bottom: 10px; border: 2px solid #eaeaea; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .option:hover { border-color: #bdc3c7; background: #f9f9f9; }
        .option.selected { border-color: #3498db; background: #e8f4fc; }
        .option.correct { border-color: #2ecc71; background: #e8f8ef; }
        .option.incorrect { border-color: #e74c3c; background: #fdedec; }
        
        .explanation { background: #f9f9f9; border-left: 4px solid #3498db; padding: 15px; border-radius: 6px; margin-top: 20px; display: none; }
        
        .controls { display: flex; justify-content: space-between; margin-top: 20px; }
        .question-nav { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 25px; }
        .nav-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #ddd; background: white; cursor: pointer; font-size: 14px; }
        .nav-btn.current { background: #3498db; border-color: #3498db; color: white; }
        .nav-btn.answered { background: #2ecc71; border-color: #2ecc71; color: white; }
        .nav-btn.incorrect { background: #e74c3c; border-color: #e74c3c; color: white; }
        
        .status { margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 14px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; margin: 15px 0; }
        
        /* 判断题选项样式 */
        .true-false-options {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .true-false-btn {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .true-btn {
            background: #e8f6f3;
            border: 2px solid #1abc9c;
            color: #16a085;
        }
        .false-btn {
            background: #fdedec;
            border: 2px solid #e74c3c;
            color: #c0392b;
        }
        .true-btn.selected {
            background: #1abc9c;
            color: white;
        }
        .false-btn.selected {
            background: #e74c3c;
            color: white;
        }
        .true-btn.correct {
            background: #2ecc71;
            border-color: #27ae60;
            color: white;
        }
        .false-btn.incorrect {
            background: #e74c3c;
            border-color: #c0392b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>智能题库练习系统</h1>
        <p class="subtitle">支持多种格式导入，专注于背题复习</p>
        
        <div class="import-area" id="importArea">
            <div class="format-guide">
                <h3>📋 选择题库来源</h3>
                <p>请选择一种方式加载题目：</p>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-success" id="useSingleChoiceBtn">单选题库（70道Kotlin/Android题）</button>
                <button class="btn btn-warning" id="useTrueFalseBtn">判断题库（30道Kotlin/Android题）</button>
                <button class="btn btn-primary" id="useCustomBtn">使用自定义题库（JSON格式）</button>
                <button class="btn btn-secondary" id="useTextBtn">使用文本格式导入</button>
            </div>
            
            <div id="customInputArea" style="display: none;">
                <textarea id="inputArea" placeholder='请在此粘贴JSON格式的题目数据，例如：
[
  {
    "id": 1,
    "question": "题目内容",
    "options": ["A. 选项A", "B. 选项B", "C. 选项C", "D. 选项D"],
    "answer": "C",
    "explanation": "解析内容",
    "type": "single"  // 或 "truefalse"
  }
]'></textarea>
                <button class="btn btn-primary" id="importCustomBtn">导入自定义题库</button>
            </div>
            
            <div id="textInputArea" style="display: none;">
                <textarea id="textInput" placeholder="请在此粘贴文本格式的题目..."></textarea>
                <button class="btn btn-primary" id="importTextBtn">导入文本题库</button>
            </div>
            
            <div id="status" class="status"></div>
        </div>
        
        <div class="practice-area" id="practiceArea">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalQuestions">0</div>
                    <div class="stat-label">题目总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="answeredQuestions">0</div>
                    <div class="stat-label">已答题数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="correctAnswers">0</div>
                    <div class="stat-label">答对题数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="accuracyRate">0%</div>
                    <div class="stat-label">正确率</div>
                </div>
            </div>
            
            <div class="question-box" id="questionBox"></div>
            
            <div class="controls">
                <button class="btn btn-secondary" id="prevBtn">上一题</button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" id="submitBtn">提交答案</button>
                    <button class="btn btn-success" id="nextBtn">下一题</button>
                </div>
                <button class="btn btn-secondary" id="showAnswerBtn">显示答案</button>
            </div>
            
            <div class="question-nav" id="questionNav"></div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-danger" id="resetBtn">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        // 内置题库 - 70道Kotlin/Android单选题
     // 70道Kotlin/Android单选题
const singleChoiceQuestions = [
  {
    id: 1,
    question: "下列关于 Kotlin 与 Java 注释写法的说法，正确的是？",
    options: [
      "A. 单行注释 Kotlin 用 //,Java 用 #",
      "B. 多行注释 Kotlin 用 /*/,Java 无多行注释",
      "C. 注释写法与 Java 完全一致",
      "D. Kotlin 无单行注释"
    ],
    answer: "C",
    explanation: "Kotlin 与 Java 的注释写法完全相同，单行注释均使用 '//'，多行注释均使用 '/**'；A 选项中 Java 单行注释不用 '#'，B 选项中 Java 支持多行注释，D 选项中 Kotlin 有单行注释，因此正确答案为 C。"
  },
  {
    id: 2,
    question: "关于 Kotlin 的注释写法，以下说法正确的是？",
    options: [
      "A. 单行注释使用 //,多行注释使用 /*/,与 Java 一致",
      "B. 单行注释使用 #,多行注释使用 //",
      "C. 单行注释使用 //,多行注释使用 //*",
      "D. Kotlin 不支持多行注释"
    ],
    answer: "A",
    explanation: "Kotlin 的注释规则与 Java 完全一致，单行注释以 // 开头，多行注释以 /* 开头、*/结尾；B 中 # 是 Python 等语言的单行注释符号；C 的多行注释写法不合法；D 错误，Kotlin 支持多行注释。因此正确答案为 A。"
  },
  {
    id: 3,
    question: "Kotlin 首次发布的年份是？",
    options: [
      "A. 2016 年",
      "B. 2017 年",
      "C. 2011 年",
      "D. 2019 年"
    ],
    answer: "C",
    explanation: "JetBrains 于 2011 年首次发布 Kotlin 项目；2016 年是 Kotlin 1.0 正式版发布年份，标志其进入生产环境；2017 年 Google 宣布 Kotlin 为 Android 官方开发语言；2019 年 Kotlin 成为 Android 首选开发语言，因此正确答案为 C。"
  },
  {
    id: 4,
    question: "Kotlin 成为 Android 官方首选开发语言的年份是？",
    options: [
      "A. 2017 年",
      "B. 2016 年",
      "C. 2020 年",
      "D. 2019 年"
    ],
    answer: "D",
    explanation: "2017 年 Google 仅宣布 Kotlin 为 Android 官方开发语言，并非'首选'；2016 年是 Kotlin 1.0 正式版发布年份；2019 年 Google 明确 Kotlin 成为 Android 官方首选开发语言，2020 年无此相关重要节点，因此正确答案为 D。"
  },
  {
    id: 5,
    question: "Kotlin 对比 Java 的核心优势不包括下列哪项？",
    options: [
      "A. 编译期空安全",
      "B. 表达式函数体",
      "C. 语法更繁琐",
      "D. 自动生成 getter/setter"
    ],
    answer: "C",
    explanation: "Kotlin 的核心优势之一是语法简洁，能减少约 40% 的模板代码，而非'语法更繁琐'，编译期空安全可避免空指针异常，表达式函数体简化单行函数写法，自动生成 getter/setter 能提高开发效率，均为其核心优势，因此正确答案为 C。"
  },
  {
    id: 6,
    question: "Kotlin 中定义可变变量应使用的关键字是？",
    options: [
      "A. val",
      "B. final",
      "C. var",
      "D. static"
    ],
    answer: "C",
    explanation: "Kotlin 中 var 用于定义可变变量，支持多次赋值；val 用于定义不可变变量，仅能赋值一次；final 是 Java 中定义常量的关键字；static 用于 Java 中声明静态成员，均不用于 Kotlin 可变变量定义。因此正确答案为 C。"
  },
  {
    id: 7,
    question: "以下 Kotlin 代码的输出结果是？\nval apples = 5;\nval oranges = 8;\nprintln('水果总数:${apples + oranges}')",
    options: [
      "A. 水果总数:58",
      "B. 水果总数:apples + oranges",
      "C. 水果总数:13",
      "D. 编译错误"
    ],
    answer: "C",
    explanation: "Kotlin 字符串模板中，${} 可包裹复杂表达式并计算结果，apples + oranges 的结果为 13，因此输出'水果总数:13'；A 是字符串拼接而非数值相加，错误；B 未识别表达式，错误；该代码语法合法，不会编译错误，D 错误。因此正确答案为 C。"
  },
  {
    id: 8,
    question: "Kotlin 中 val 变量的 getter/setter 特性是？",
    options: [
      "A. 自动生成 getter 和 setter",
      "B. 需手动编写 getter 和 setter",
      "C. 仅自动生成 getter",
      "D. 仅自动生成 setter"
    ],
    answer: "C",
    explanation: "val 是不可变变量，一旦赋值无法修改，因此系统仅自动生成 getter 方法用于读取值；var 是可变变量，会自动生成 getter 和 setter 方法；val 无需手动编写 getter，B 错误。因此正确答案为 C。"
  },
  {
    id: 9,
    question: "Kotlin 函数的命名参数的作用是？",
    options: [
      "A. 强制参数必须按固定顺序传入",
      "B. 减少函数参数的数量",
      "C. 提高代码可读性，明确参数用途",
      "D. 只能用于无返回值的函数"
    ],
    answer: "C",
    explanation: "命名参数允许调用函数时明确指定参数名，即使调整参数顺序也不影响功能，能让他人清晰了解每个参数的含义，提高代码可读性；A 错误，命名参数支持灵活调整参数顺序；B 错误，命名参数不改变参数数量；D 错误，命名参数可用于各类函数，与是否有返回值无关。因此正确答案为 C。"
  },
  {
    id: 10,
    question: "有以下 greet 函数的定义，则下列选项中，属于默认参数用法的是？\nfun greet(name: String = 'Guest') {\n  println('Hello $name')\n}",
    options: [
      "A. greet('李四')",
      "B. greet(name = '王五')",
      "C. greet()",
      "D. greet('赵六', 'Guest')"
    ],
    answer: "C",
    explanation: "默认参数函数 greet(name: String = 'Guest') 中，name 参数有默认值'Guest'，调用时可不传入该参数，直接使用默认值，C 符合；A 和 B 是传入参数的调用方式；D 传入两个参数，而函数仅接收一个参数，参数数量不匹配，语法错误。因此正确答案为 C。"
  },
  {
    id: 11,
    question: "Kotlin 中替代 Java 三元表达式(条件？表达式1：表达式2)的是？",
    options: [
      "A. when 表达式",
      "B. for 循环",
      "C. if-else 表达式",
      "D. while 循环"
    ],
    answer: "C",
    explanation: "Kotlin 没有三元表达式，可通过 if-else 表达式实现赋值操作，如 val max = if (a > b) a else b，与三元表达式功能一致；when 表达式用于多分支选择；for 和 while 是循环语句，均不具备条件赋值功能。因此正确答案为 C。"
  },
  {
    id: 12,
    question: "以下关于 Kotlin while 循环的说法正确的是？",
    options: [
      "A. 至少执行一次循环体",
      "B. 循环体不能包含变量自增操作",
      "C. 初始条件不成立时，一次都不执行",
      "D. 必须与 do 关键字配合使用"
    ],
    answer: "C",
    explanation: "while 循环先判断初始条件，若条件不成立则不执行循环体；A 是 do-while 循环的特点；B 错误，while 循环体可正常包含变量自增；D 错误，while 循环独立使用，do-while 是另一种循环结构，无需配合。因此正确答案为 C。"
  },
  {
    id: 13,
    question: "有以下函数定义，则下列选项中调用方式错误的是？\nfun checkScore(name: String, score: Int = 60)",
    options: [
      "A. checkScore('张三')",
      "B. checkScore('李四', 85)",
      "C. checkScore(score = 70, name = '王五')",
      "D. checkScore(90, '赵六')"
    ],
    answer: "D",
    explanation: "该函数第一个参数 name 为 String 类型，第二个参数 score 为 Int 类型，D 中传入的参数顺序颠倒，90（Int 类型）无法匹配 name 参数，'赵六'（String 类型）无法匹配 score 参数，编译错误；A 仅传入 name 参数，score 使用默认值 60，正确；B 传入两个参数，顺序正确，正确；C 使用命名参数，顺序可调整，正确。因此正确答案为 D。"
  },
  {
    id: 14,
    question: "以下 Kotlin 代码中，自定义 getter 逻辑正确的是？",
    options: [
      "A. var number: Int = 10\n   get() = field * 2\n   set(value) { field = value }",
      "B. val number: Int = 10\n   set() = field + 5",
      "C. var number: Int = 10\n   get() { field = field * 2 }",
      "D. val number: Int = 10\n   set(value) { field = value }"
    ],
    answer: "A",
    explanation: "自定义 getter 需返回对应类型的值，A 中 get() 返回 field * 2，逻辑正确，setter 也符合规范；B 中 val 为不可变变量，不可自定义 setter；C 中 getter 未返回值，语法错误；D 中 val 不可变变量不能自定义 setter，语法错误。因此正确答案为 A。"
  },
  {
    id: 15,
    question: "Kotlin 类中，主构造函数、init 初始化块、次构造函数的执行顺序是？",
    options: [
      "A. 次构造函数体→init 块→主构造参数赋值",
      "B. init 块→主构造参数赋值→次构造函数体",
      "C. 主构造参数赋值→init 块→次构造函数体",
      "D. 主构造参数赋值→次构造函数体→init 块"
    ],
    answer: "C",
    explanation: "Kotlin 类初始化时，先执行主构造函数的参数赋值和属性初始化，再依次执行所有 init 块的逻辑，最后执行次构造函数体；A、B、D 均颠倒了执行顺序，不符合类初始化的底层逻辑。因此正确答案为 C。"
  },
  {
    id: 16,
    question: "open 关键字的作用是？",
    options: [
      "A. 声明抽象类，不能直接实例化",
      "B. 禁止类或方法被继承/重写",
      "C. 允许类或方法被继承/重写",
      "D. 声明编译期常量，只能用于属性"
    ],
    answer: "C",
    explanation: "Kotlin 中类和方法默认是 final（不可继承/重写），open 关键字用于取消该限制，允许类被继承、方法被重写；A 是 abstract 关键字的作用；B 是 final 关键字的作用（默认行为）；D 是 const 关键字的作用。因此正确答案为 C。"
  },
  {
    id: 17,
    question: "以下关于 abstract 关键字的说法，正确的是？",
    options: [
      "A. 抽象类可直接实例化，无需子类继承",
      "B. 抽象方法必须包含方法体，子类可选择是否重写",
      "C. 抽象类中可包含非抽象方法（带实现）",
      "D. 一个类可同时继承多个抽象类"
    ],
    answer: "C",
    explanation: "抽象类（abstract class）中可混合包含抽象方法（无方法体，需子类重写）和非抽象方法（带实现）；A 错误，抽象类不能直接实例化，必须通过子类继承实现；B 错误，抽象方法无方法体，子类必须重写；D 错误，Kotlin 仅支持单继承，不能同时继承多个抽象类。因此正确答案为 C。"
  },
  {
    id: 18,
    question: "Kotlin 中实现'类级别的静态成员'，可通过以下哪种方式？",
    options: [
      "A. 直接使用 static 关键字声明",

                answer: "正确",
                explanation: "Java/Kotlin 中泛型在编译时会被擦除，直接使用 List::class.java 无法让 Gson 识别具体泛型类型。TypeToken 通过匿名内部类的方式保留泛型信息，明确指定 List 类型，确保解析准确。",

            },
            {
                id: 30,
                question: "DataBinding 中绑定变量到 UI 控件的语法是 @{变量名}。",
                answer: "正确",
                explanation: "DataBinding 采用 @{变量名} 的专属语法实现数据与 UI 控件的绑定，例如 android:text='@{user.name}' 可将 user 对象的 name 属性绑定到 TextView 的文本属性，是数据绑定的核心语法规则。",
                type: "truefalse"
            }
        ];

        // 数据存储
        let questions = [];
        let currentIndex = 0;
        let userAnswers = {};
        let results = {};
        
        // DOM元素
        const useSingleChoiceBtn = document.getElementById('useSingleChoiceBtn');
        const useTrueFalseBtn = document.getElementById('useTrueFalseBtn');
        const useCustomBtn = document.getElementById('useCustomBtn');
        const useTextBtn = document.getElementById('useTextBtn');
        const importCustomBtn = document.getElementById('importCustomBtn');
        const importTextBtn = document.getElementById('importTextBtn');
        const customInputArea = document.getElementById('customInputArea');
        const textInputArea = document.getElementById('textInputArea');
        const inputArea = document.getElementById('inputArea');
        const textInput = document.getElementById('textInput');
        const resetBtn = document.getElementById('resetBtn');
        const importArea = document.getElementById('importArea');
        const practiceArea = document.getElementById('practiceArea');
        const questionBox = document.getElementById('questionBox');
        const questionNav = document.getElementById('questionNav');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const showAnswerBtn = document.getElementById('showAnswerBtn');
        const statusEl = document.getElementById('status');
        
        // 初始化
        init();
        
        function init() {
            useSingleChoiceBtn.addEventListener('click', () => loadQuestions(singleChoiceQuestions));
            useTrueFalseBtn.addEventListener('click', () => loadQuestions(trueFalseQuestions));
            useCustomBtn.addEventListener('click', () => {
                customInputArea.style.display = 'block';
                textInputArea.style.display = 'none';
            });
            useTextBtn.addEventListener('click', () => {
                textInputArea.style.display = 'block';
                customInputArea.style.display = 'none';
            });
            importCustomBtn.addEventListener('click', importCustomQuestions);
            importTextBtn.addEventListener('click', () => {
    showStatus('文本导入功能暂未实现', 'error');
});
            resetBtn.addEventListener('click', resetPractice);
            prevBtn.addEventListener('click', showPrev);
            nextBtn.addEventListener('click', showNext);
            submitBtn.addEventListener('click', submitAnswer);
            showAnswerBtn.addEventListener('click', showAnswer);
        }
        
        // 加载题目
        function loadQuestions(questionArray) {
            if (!questionArray || questionArray.length === 0) {
                showStatus('题库为空，请检查数据格式', 'error');
                return;
            }
            
            questions = questionArray;
            
            // 初始化答题状态
            userAnswers = {};
            results = {};
            currentIndex = 0;
            
            questions.forEach((_, i) => {
                userAnswers[i] = null;
                results[i] = { answered: false, correct: false };
            });
            
            // 切换界面
            importArea.style.display = 'none';
            practiceArea.style.display = 'block';
            
            // 更新统计
            updateStats();
            
            // 显示第一题
            showQuestion(currentIndex);
            
            // 生成导航
            generateNav();
            
            showStatus(`成功加载${questions.length}道题目，开始练习吧！`, 'success');
        }
        
        // 导入自定义JSON题库
        function importCustomQuestions() {
            try {
                const jsonText = inputArea.value.trim();
                if (!jsonText) {
                    showStatus('请输入JSON数据', 'error');
                    return;
                }
                
                const questionArray = JSON.parse(jsonText);
                // 确保每个题目都有type属性
                questionArray.forEach(q => {
                    if (!q.type) {
                        q.type = q.options ? "single" : "truefalse";
                    }
                });
                loadQuestions(questionArray);
            } catch (error) {
                showStatus('JSON格式错误: ' + error.message, 'error');
            }
        }
        
        // 显示题目
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentIndex = index;
            const q = questions[index];
            
            // 构建HTML
            let html = `
                <div class="question-header">
                    <div class="question-number">第 ${index + 1} 题</div>
                    <div class="question-type ${q.type === 'truefalse' ? 'truefalse' : 'single'}">
                        ${q.type === 'truefalse' ? '判断题' : '单选题'}
                    </div>
                </div>
                <div class="question-text"><strong>${q.question}</strong></div>
            `;
            
            if (q.type === 'truefalse') {
                // 判断题
                let trueClass = 'true-btn';
                let falseClass = 'false-btn';
                const userAnswer = userAnswers[index];
                
                if (userAnswer !== null) {
                    if (userAnswer === '正确') trueClass += ' selected';
                    if (userAnswer === '错误') falseClass += ' selected';
                    
                    if (results[index] && results[index].answered) {
                        if (q.answer === '正确') trueClass += ' correct';
                        else falseClass += ' correct';
                        
                        if (userAnswer !== q.answer) {
                            if (userAnswer === '正确') trueClass += ' incorrect';
                            else falseClass += ' incorrect';
                        }
                    }
                }
                
                html += `
                    <div class="true-false-options">
                        <div class="${trueClass}" data-answer="正确">✅ 正确</div>
                        <div class="${falseClass}" data-answer="错误">❌ 错误</div>
                    </div>
                `;
            } else {
                // 单选题
                html += '<div class="options">';
                
                q.options.forEach((opt, i) => {
                    let cls = 'option';
                    const userAnswer = userAnswers[index];
                    const optionLetter = opt.charAt(0); // 获取选项字母
                    
                    if (userAnswer !== null) {
                        if (optionLetter === userAnswer) cls += ' selected';
                        if (results[index] && results[index].answered) {
                            if (optionLetter === q.answer) cls += ' correct';
                            else if (optionLetter === userAnswer && userAnswer !== q.answer) cls += ' incorrect';
                        }
                    }
                    
                    html += `<div class="${cls}" data-answer="${optionLetter}">${opt}</div>`;
                });
                
                html += '</div>';
            }
            
            html += `
                <div class="explanation" id="explanation">
                    <strong>📝 解析：</strong>${q.explanation || '暂无解析'}
                </div>
            `;
            
            questionBox.innerHTML = html;
            
            // 绑定选项点击
            if (q.type === 'truefalse') {
                document.querySelectorAll('.true-btn, .false-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        if (results[index] && results[index].answered) return;
                        
                        document.querySelectorAll('.true-btn, .false-btn').forEach(b => {
                            b.classList.remove('selected');
                        });
                        this.classList.add('selected');
                        
                        userAnswers[index] = this.getAttribute('data-answer');
                        updateSubmitBtn();
                    });
                });
            } else {
                document.querySelectorAll('.option').forEach(opt => {
                    opt.addEventListener('click', function() {
                        if (results[index] && results[index].answered) return;
                        
                        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                        this.classList.add('selected');
                        
                        userAnswers[index] = this.getAttribute('data-answer');
                        updateSubmitBtn();
                    });
                });
            }
            
            // 更新UI
            updateNavButtons();
            updateSubmitBtn();
            updateNavHighlight();
            document.getElementById('explanation').style.display = 'none';
        }
        
        // 更新导航按钮
        function updateNavButtons() {
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === questions.length - 1;
        }
        
        // 更新提交按钮
        function updateSubmitBtn() {
            if (results[currentIndex] && results[currentIndex].answered) {
                submitBtn.textContent = '已提交';
                submitBtn.disabled = true;
            } else {
                submitBtn.textContent = '提交答案';
                submitBtn.disabled = userAnswers[currentIndex] === null;
            }
        }
        
        // 更新导航高亮
        function updateNavHighlight() {
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach((btn, i) => {
                btn.classList.remove('current');
                if (i === currentIndex) btn.classList.add('current');
            });
        }
        
        // 生成导航
        function generateNav() {
            questionNav.innerHTML = '';
            
            for (let i = 0; i < questions.length; i++) {
                const btn = document.createElement('div');
                btn.className = 'nav-btn';
                btn.textContent = i + 1;
                
                if (results[i] && results[i].answered) {
                    btn.classList.add(results[i].correct ? 'answered' : 'incorrect');
                }
                
                if (i === currentIndex) {
                    btn.classList.add('current');
                }
                
                btn.addEventListener('click', () => showQuestion(i));
                questionNav.appendChild(btn);
            }
        }
        
        // 上一题
        function showPrev() {
            if (currentIndex > 0) showQuestion(currentIndex - 1);
        }
        
        // 下一题
        function showNext() {
            if (currentIndex < questions.length - 1) showQuestion(currentIndex + 1);
        }
        
        // 提交答案
        function submitAnswer() {
            const q = questions[currentIndex];
            const userAnswer = userAnswers[currentIndex];
            
            if (userAnswer === null) {
                showStatus('请先选择答案', 'error');
                return;
            }
            
            const correct = userAnswer === q.answer;
            results[currentIndex] = { answered: true, correct: correct };
            
            // 重新显示
            showQuestion(currentIndex);
            
            // 显示解析
            document.getElementById('explanation').style.display = 'block';
            
            // 更新统计和导航
            updateStats();
            generateNav();
            
            // 显示结果
            if (correct) {
                showStatus('✅ 回答正确！', 'success');
            } else {
                showStatus(`❌ 回答错误！正确答案是：${q.answer}`, 'error');
            }
        }
        
        // 显示答案
        function showAnswer() {
            const q = questions[currentIndex];
            document.getElementById('explanation').style.display = 'block';
            showStatus(`正确答案：${q.answer}`, 'success');
        }
        
        // 更新统计
        function updateStats() {
            let answered = 0, correct = 0;
            
            for (let i = 0; i < questions.length; i++) {
                if (results[i] && results[i].answered) {
                    answered++;
                    if (results[i].correct) correct++;
                }
            }
            
            document.getElementById('totalQuestions').textContent = questions.length;
            document.getElementById('answeredQuestions').textContent = answered;
            document.getElementById('correctAnswers').textContent = correct;
            
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            document.getElementById('accuracyRate').textContent = accuracy + '%';
        }
        
        // 重置练习
        function resetPractice() {
            if (confirm('确定要重新开始吗？当前进度将丢失。')) {
                practiceArea.style.display = 'none';
                importArea.style.display = 'block';
                customInputArea.style.display = 'none';
                textInputArea.style.display = 'none';
                
                questions = [];
                userAnswers = {};
                results = {};
                currentIndex = 0;
                
                showStatus('', '');
            }
        }
        
        // 显示状态
        function showStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = 'status ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
            
            if (msg) {
                setTimeout(() => {
                    statusEl.textContent = '';
                    statusEl.className = 'status';
                }, 3000);
            }
        }
    </script>
</body>
</html>
