<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫咪图库 - The Cat API应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 2rem;
        }
        
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        h1 {
            color: #4a69bd;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }
        
        .subtitle {
            color: #6c757d;
            font-size: 1.1rem;
        }
        
        .cat-container {
            position: relative;
            margin: 2rem 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }
        
        #cat-image {
            max-width: 100%;
            max-height: 500px;
            display: none;
            border-radius: 10px;
        }
        
        .placeholder {
            color: #adb5bd;
            font-size: 1.2rem;
            text-align: center;
            padding: 2rem;
        }
        
        .loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4a69bd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        button {
            background-color: #4a69bd;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px rgba(74, 105, 189, 0.3);
        }
        
        button:hover {
            background-color: #3c5aa8;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(74, 105, 189, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background-color: #adb5bd;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .cat-info {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        
        .cat-info h3 {
            color: #4a69bd;
            margin-bottom: 0.5rem;
        }
        
        .error-message {
            color: #e74c3c;
            text-align: center;
            padding: 1rem;
            display: none;
        }
        
        footer {
            margin-top: 2rem;
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 1.5rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .cat-container {
                min-height: 300px;
            }
            
            button {
                padding: 0.7rem 1.2rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐱 猫咪图库</h1>
            <p class="subtitle">使用 The Cat API 获取随机猫咪图片</p>
        </header>
        
        <div class="cat-container">
            <div class="placeholder" id="placeholder">点击下方按钮获取可爱的猫咪图片</div>
            <div class="loader" id="loader"></div>
            <img id="cat-image" alt="随机猫咪图片">
        </div>
        
        <div class="error-message" id="error-message"></div>
        
        <div class="cat-info" id="cat-info">
            <h3>关于这张图片</h3>
            <p>这张可爱的猫咪图片来自 The Cat API，这是一个提供各种猫咪图片的免费API。</p>
        </div>
        
        <div class="controls">
            <button id="get-cat-btn">
                <span>获取新猫咪</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4V9H4.58152M19.9381 11C19.446 7.05369 16.0796 4 12 4C8.64262 4 5.76829 6.06817 4.58152 9M4.58152 9H9M20 20V15H19.4185M19.4185 15C18.2317 17.9318 15.3574 20 12 20C7.92038 20 4.55399 16.9463 4.06189 13M19.4185 15H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
    
    <footer>
        <p>数据来源: <a href="https://thecatapi.com/" target="_blank">The Cat API</a></p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const getCatBtn = document.getElementById('get-cat-btn');
            const catImage = document.getElementById('cat-image');
            const placeholder = document.getElementById('placeholder');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');
            const catInfo = document.getElementById('cat-info');
            
            // 获取猫咪图片函数
            async function fetchCatImage() {
                // 显示加载状态
                placeholder.style.display = 'none';
                catImage.style.display = 'none';
                errorMessage.style.display = 'none';
                loader.style.display = 'block';
                getCatBtn.disabled = true;
                
                try {
                    // 使用 The Cat API 获取随机猫咪图片
                    const response = await fetch('https://api.thecatapi.com/v1/images/search');
                    
                    if (!response.ok) {
                        throw new Error('网络请求失败');
                    }
                    
                    const data = await response.json();
                    
                    if (data && data.length > 0) {
                        // 设置图片源
                        catImage.src = data[0].url;
                        
                        // 图片加载完成后显示
                        catImage.onload = function() {
                            loader.style.display = 'none';
                            catImage.style.display = 'block';
                            catInfo.style.display = 'block';
                            getCatBtn.disabled = false;
                        };
                        
                        // 如果图片加载失败
                        catImage.onerror = function() {
                            throw new Error('图片加载失败');
                        };
                    } else {
                        throw new Error('未找到猫咪图片');
                    }
                } catch (error) {
                    loader.style.display = 'none';
                    errorMessage.textContent = `错误: ${error.message}`;
                    errorMessage.style.display = 'block';
                    getCatBtn.disabled = false;
                }
            }
            
            // 点击按钮获取新猫咪图片
            getCatBtn.addEventListener('click', fetchCatImage);
            
            // 页面加载时自动获取一张猫咪图片
            fetchCatImage();
        });
    </script>
</body>
</html>
