<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能学习计时器 - 带奖励机制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .timer-display {
            font-size: 48px;
            font-weight: 700;
            color: #2c3e50;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .progress-container {
            margin: 25px 0;
        }
        
        .progress-bar {
            height: 10px;
            background: #ecf0f1;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        
        .status {
            font-size: 18px;
            margin: 15px 0;
            padding: 10px;
            border-radius: 10px;
            background: #e8f4fd;
            color: #2980b9;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            font-size: 14px;
            color: #7f8c8d;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        #startBtn {
            background: linear-gradient(to right, #00b09b, #96c93d);
            color: white;
        }
        
        #pauseBtn {
            background: linear-gradient(to right, #ff8c00, #ff2d00);
            color: white;
        }
        
        #resetBtn {
            background: #ecf0f1;
            color: #2c3e50;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.15);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .reminder {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #fff3cd;
            color: #856404;
            display: none;
        }
        
        .reminder.active {
            display: block;
            animation: pulse 1s infinite;
        }
        
        .reward {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            color: #d63031;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        .settings {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
            text-align: left;
        }
        
        .settings h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .setting-item {
            margin-bottom: 15px;
        }
        
        .setting-item label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .setting-item input, .setting-item select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .audio-controls button {
            padding: 8px 15px;
            font-size: 14px;
        }
        
        .audio-info {
            flex-grow: 1;
            text-align: left;
        }
        
        .audio-info .title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .audio-info .status {
            font-size: 14px;
            padding: 0;
            margin: 0;
            background: transparent;
        }
        
        .local-music-upload {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px dashed #ddd;
        }
        
        .local-music-upload.active {
            border-color: #6a11cb;
            background: #f0e6ff;
        }
        
        .upload-area {
            text-align: center;
            padding: 20px;
            cursor: pointer;
        }
        
        .upload-area i {
            font-size: 40px;
            color: #6a11cb;
            margin-bottom: 10px;
        }
        
        .upload-area p {
            margin: 10px 0;
            color: #7f8c8d;
        }
        
        .upload-area button {
            background: #6a11cb;
            color: white;
            padding: 8px 15px;
            margin-top: 10px;
        }
        
        .local-music-list {
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .local-music-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .local-music-item:last-child {
            border-bottom: none;
        }
        
        .local-music-item .name {
            flex-grow: 1;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .local-music-item .actions {
            display: flex;
            gap: 5px;
        }
        
        .local-music-item button {
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .set-reward-btn {
            background: #ff9a9e;
            color: white;
        }
        
        .reward-music-info {
            margin-top: 10px;
            padding: 10px;
            background: #f0e6ff;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #2ecc71;
            color: white;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transform: translateX(150%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .notification.reward {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            color: #d63031;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .reward-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 14px;
            color: #7f8c8d;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .timer-display {
                font-size: 36px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
            
            .audio-controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>智能学习计时器</h1>
        <p class="subtitle">专注90分钟，随机间隔提醒休息，有机会获得奖励休息！</p>
        
        <div class="timer-display" id="timer">90:00</div>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress" id="progress" style="width: 0%"></div>
            </div>
        </div>
        
        <div class="status" id="status">准备开始学习</div>
        
        <div class="stats">
            <div>提醒次数: <span id="reminderCount">0</span></div>
            <div>已用时间: <span id="elapsedTime">00:00</span></div>
        </div>
        
        <div class="reward-stats">
            <div>奖励次数: <span id="rewardCount">0</span></div>
            <div>奖励概率: <span id="rewardChance">15%</span></div>
        </div>
        
        <div class="reminder" id="reminder">
            👀 请闭眼休息10秒钟...
        </div>
        
        <div class="controls">
            <button id="startBtn">开始学习</button>
            <button id="pauseBtn" disabled>暂停</button>
            <button id="resetBtn" disabled>重置</button>
        </div>
        
        <div class="settings">
            <h3>学习设置</h3>
            <div class="setting-item">
                <label for="studyTime">学习时长 (分钟)</label>
                <input type="number" id="studyTime" min="1" max="180" value="90">
            </div>
            <div class="setting-item">
                <label for="minInterval">最短提醒间隔 (分钟)</label>
                <input type="number" id="minInterval" min="1" max="10" value="3">
            </div>
            <div class="setting-item">
                <label for="maxInterval">最长提醒间隔 (分钟)</label>
                <input type="number" id="maxInterval" min="1" max="10" value="5">
            </div>
            
            <div class="setting-item">
                <label for="rewardProbability">奖励休息概率 (%)</label>
                <input type="number" id="rewardProbability" min="1" max="50" value="15">
            </div>
            
            <div class="setting-item">
                <label for="audioSelect">背景音乐</label>
                <select id="audioSelect">
                    <option value="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3">轻快电子乐</option>
                    <option value="https://assets.mixkit.co/music/preview/mixkit-driving-ambition-32.mp3">专注氛围音乐</option>
                    <option value="https://assets.mixkit.co/music/preview/mixkit-deep-urban-623.mp3">放松背景音乐</option>
                    <option value="https://assets.mixkit.co/music/preview/mixkit-hazy-after-hours-132.mp3">午后休闲音乐</option>
                    <option value="local">本地音乐</option>
                </select>
            </div>
            
            <div class="local-music-upload" id="localMusicUpload" style="display: none;">
                <div class="upload-area" id="uploadArea">
                    <i>🎵</i>
                    <h4>上传本地音乐</h4>
                    <p>点击此处或拖放MP3文件到这里</p>
                    <p class="small">支持MP3格式，文件大小不超过100MB</p>
                    <input type="file" id="musicFileInput" accept=".mp3,audio/*" style="display: none;">
                    <button id="selectFileBtn">选择文件</button>
                </div>
                
                <div class="local-music-list" id="localMusicList">
                    <!-- 本地音乐列表将在这里动态生成 -->
                </div>
                
                <div class="reward-music-info" id="rewardMusicInfo" style="display: none;">
                    <!-- 奖励音乐信息将在这里显示 -->
                </div>
            </div>
            
            <div class="audio-controls">
                <div class="audio-info">
                    <div class="title" id="audioTitle">轻快电子乐</div>
                    <div class="status" id="audioStatus">音乐已准备</div>
                </div>
                <button id="playAudioBtn">播放音乐</button>
                <button id="pauseAudioBtn" disabled>暂停音乐</button>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification">
        提醒通知
    </div>

    <!-- 音频元素 -->
    <audio id="backgroundMusic" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3" type="audio/mpeg">
        您的浏览器不支持音频元素。
    </audio>

    <!-- 奖励音乐元素 -->
    <audio id="rewardMusic">
        <!-- 奖励音乐将在触发奖励时动态设置 -->
    </audio>

    <script>
        // 全局变量
        let timer;
        let isRunning = false;
        let isPaused = false;
        let totalSeconds;
        let remainingSeconds;
        let elapsedSeconds = 0;
        let reminderCount = 0;
        let rewardCount = 0;
        let nextReminderTime;
        let studyDuration, minInterval, maxInterval, rewardProbability;
        let localMusicFiles = []; // 存储本地音乐文件
        let currentRewardMusic = null; // 当前奖励音乐
        let currentRewardMusicInfo = null; // 当前奖励音乐信息
        let currentBackgroundMusic = null; // 当前背景音乐
        
        // DOM元素
        const timerDisplay = document.getElementById('timer');
        const progressBar = document.getElementById('progress');
        const statusDisplay = document.getElementById('status');
        const reminderDisplay = document.getElementById('reminder');
        const reminderCountDisplay = document.getElementById('reminderCount');
        const rewardCountDisplay = document.getElementById('rewardCount');
        const rewardChanceDisplay = document.getElementById('rewardChance');
        const elapsedTimeDisplay = document.getElementById('elapsedTime');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const notification = document.getElementById('notification');
        const rewardMusicInfo = document.getElementById('rewardMusicInfo');
        
        // 音频相关元素
        const backgroundMusic = document.getElementById('backgroundMusic');
        const rewardMusic = document.getElementById('rewardMusic');
        const audioSelect = document.getElementById('audioSelect');
        const audioTitle = document.getElementById('audioTitle');
        const audioStatus = document.getElementById('audioStatus');
        const playAudioBtn = document.getElementById('playAudioBtn');
        const pauseAudioBtn = document.getElementById('pauseAudioBtn');
        
        // 本地音乐相关元素
        const localMusicUpload = document.getElementById('localMusicUpload');
        const uploadArea = document.getElementById('uploadArea');
        const musicFileInput = document.getElementById('musicFileInput');
        const selectFileBtn = document.getElementById('selectFileBtn');
        const localMusicList = document.getElementById('localMusicList');
        
        // 设置输入元素
        const studyTimeInput = document.getElementById('studyTime');
        const minIntervalInput = document.getElementById('minInterval');
        const maxIntervalInput = document.getElementById('maxInterval');
        const rewardProbabilityInput = document.getElementById('rewardProbability');
        
        // 初始化
        function initialize() {
            loadSettings();
            updateDisplay();
            
            // 设置音频事件监听
            backgroundMusic.addEventListener('loadeddata', function() {
                audioStatus.textContent = '音乐已准备';
            });
            
            backgroundMusic.addEventListener('play', function() {
                audioStatus.textContent = '正在播放';
                playAudioBtn.disabled = true;
                pauseAudioBtn.disabled = false;
            });
            
            backgroundMusic.addEventListener('pause', function() {
                audioStatus.textContent = '已暂停';
                playAudioBtn.disabled = false;
                pauseAudioBtn.disabled = true;
            });
            
            // 奖励音乐事件监听
            rewardMusic.addEventListener('ended', function() {
                // 奖励音乐播放结束后，恢复背景音乐
                if (isRunning && !isPaused) {
                    backgroundMusic.play();
                    audioStatus.textContent = '正在播放';
                }
            });
            
            // 音频选择变化
            audioSelect.addEventListener('change', function() {
                if (this.value === 'local') {
                    localMusicUpload.style.display = 'block';
                    // 如果有本地音乐，选择第一个
                    if (localMusicFiles.length > 0) {
                        playLocalMusic(localMusicFiles[0]);
                    }
                } else {
                    localMusicUpload.style.display = 'none';
                    backgroundMusic.src = this.value;
                    backgroundMusic.loop = true; // 确保背景音乐循环播放
                    audioTitle.textContent = this.options[this.selectedIndex].text;
                    audioStatus.textContent = '正在加载...';
                    playAudioBtn.disabled = true;
                    pauseAudioBtn.disabled = true;
                }
            });
            
            // 音频控制按钮
            playAudioBtn.addEventListener('click', function() {
                backgroundMusic.play().catch(e => {
                    console.error("播放失败:", e);
                    audioStatus.textContent = '播放失败，请点击开始学习后自动播放';
                });
            });
            
            pauseAudioBtn.addEventListener('click', function() {
                backgroundMusic.pause();
            });
            
            // 本地音乐上传相关
            selectFileBtn.addEventListener('click', function() {
                musicFileInput.click();
            });
            
            musicFileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    handleFileUpload(e.target.files[0]);
                }
            });
            
            // 拖放功能
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.parentElement.classList.add('active');
            });
            
            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                uploadArea.parentElement.classList.remove('active');
            });
            
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.parentElement.classList.remove('active');
                
                if (e.dataTransfer.files.length > 0) {
                    handleFileUpload(e.dataTransfer.files[0]);
                }
            });
            
            // 从本地存储加载已上传的音乐
            loadLocalMusicFromStorage();
            
            // 设置奖励音乐
            setupRewardMusic();
        }
        
        // 设置奖励音乐
        function setupRewardMusic() {
            // 尝试从本地存储中获取奖励音乐
            const rewardMusicData = localStorage.getItem('rewardMusic');
            
            if (rewardMusicData) {
                try {
                    const rewardData = JSON.parse(rewardMusicData);
                    rewardMusic.src = rewardData.url;
                    currentRewardMusic = rewardData.url;
                    currentRewardMusicInfo = rewardData;
                    updateRewardMusicInfo();
                    console.log('已加载奖励音乐:', rewardData.name);
                } catch (e) {
                    console.error('加载奖励音乐失败:', e);
                    // 如果加载失败，使用默认的在线奖励音乐
                    setDefaultRewardMusic();
                }
            } else {
                // 如果没有设置奖励音乐，使用默认的在线奖励音乐
                setDefaultRewardMusic();
            }
        }
        
        // 设置默认奖励音乐
        function setDefaultRewardMusic() {
            rewardMusic.src = "https://assets.mixkit.co/music/preview/mixkit-happy-day-583.mp3";
            currentRewardMusic = rewardMusic.src;
            currentRewardMusicInfo = {
                name: "默认奖励音乐",
                url: rewardMusic.src
            };
            updateRewardMusicInfo();
        }
        
        // 更新奖励音乐信息显示
        function updateRewardMusicInfo() {
            if (currentRewardMusicInfo) {
                rewardMusicInfo.style.display = 'block';
                rewardMusicInfo.innerHTML = `
                    <strong>当前奖励音乐:</strong> ${currentRewardMusicInfo.name}
                `;
            } else {
                rewardMusicInfo.style.display = 'none';
            }
        }
        
        // 处理文件上传
        function handleFileUpload(file) {
            // 检查文件类型
            if (!file.type.startsWith('audio/')) {
                showNotification('请上传音频文件');
                return;
            }
            
            // 检查文件大小 (限制为100MB)
            if (file.size > 100 * 1024 * 1024) {
                showNotification('文件大小不能超过100MB');
                return;
            }
            
            // 创建文件URL
            const fileURL = URL.createObjectURL(file);
            
            // 添加到本地音乐列表
            const musicFile = {
                id: Date.now(),
                name: file.name,
                url: fileURL,
                file: file
            };
            
            localMusicFiles.push(musicFile);
            
            // 更新本地音乐列表显示
            updateLocalMusicList();
            
            // 保存到本地存储
            saveLocalMusicToStorage();
            
            // 自动选择并播放新上传的音乐
            playLocalMusic(musicFile);
            
            showNotification(`已上传: ${file.name}`);
        }
        
        // 播放本地音乐
        function playLocalMusic(musicFile) {
            backgroundMusic.src = musicFile.url;
            backgroundMusic.loop = true; // 确保背景音乐循环播放
            audioTitle.textContent = musicFile.name;
            audioStatus.textContent = '正在加载...';
            playAudioBtn.disabled = true;
            pauseAudioBtn.disabled = true;
            
            // 确保音频选择框显示"本地音乐"
            audioSelect.value = 'local';
            localMusicUpload.style.display = 'block';
            
            // 更新列表中的选中状态
            updateLocalMusicList(musicFile.id);
        }
        
        // 设置奖励音乐
        function setRewardMusic(musicFile) {
            // 保存奖励音乐信息到本地存储
            const rewardData = {
                id: musicFile.id,
                name: musicFile.name,
                url: musicFile.url
            };
            
            localStorage.setItem('rewardMusic', JSON.stringify(rewardData));
            
            // 更新奖励音乐播放器
            rewardMusic.src = musicFile.url;
            currentRewardMusic = musicFile.url;
            currentRewardMusicInfo = rewardData;
            
            updateRewardMusicInfo();
            updateLocalMusicList();
            
            showNotification(`已将 "${musicFile.name}" 设为奖励音乐`);
        }
        
        // 删除本地音乐
        function deleteLocalMusic(id) {
            const index = localMusicFiles.findIndex(file => file.id === id);
            if (index !== -1) {
                // 释放URL对象
                URL.revokeObjectURL(localMusicFiles[index].url);
                
                // 从数组中移除
                localMusicFiles.splice(index, 1);
                
                // 更新列表显示
                updateLocalMusicList();
                
                // 保存到本地存储
                saveLocalMusicToStorage();
                
                showNotification('已删除音乐文件');
                
                // 如果删除的是当前正在播放的音乐，停止播放
                if (backgroundMusic.src.includes(localMusicFiles[index]?.url)) {
                    backgroundMusic.pause();
                    backgroundMusic.src = '';
                    audioTitle.textContent = '无音乐';
                    audioStatus.textContent = '请选择音乐';
                }
                
                // 如果删除的是奖励音乐，重置奖励音乐
                if (currentRewardMusicInfo && currentRewardMusicInfo.id === id) {
                    localStorage.removeItem('rewardMusic');
                    setDefaultRewardMusic();
                }
            }
        }
        
        // 更新本地音乐列表显示
        function updateLocalMusicList(selectedId = null) {
            localMusicList.innerHTML = '';
            
            if (localMusicFiles.length === 0) {
                localMusicList.innerHTML = '<p style="text-align: center; color: #7f8c8d;">暂无本地音乐</p>';
                return;
            }
            
            localMusicFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = 'local-music-item';
                
                // 如果是当前奖励音乐，添加特殊样式
                if (currentRewardMusicInfo && currentRewardMusicInfo.id === file.id) {
                    item.style.background = '#f0e6ff';
                    item.style.borderLeft = '3px solid #6a11cb';
                } else if (selectedId === file.id) {
                    item.style.background = '#e8f4fd';
                }
                
                item.innerHTML = `
                    <div class="name">${file.name}</div>
                    <div class="actions">
                        <button class="play-btn" data-id="${file.id}">播放</button>
                        <button class="set-reward-btn" data-id="${file.id}">设为奖励</button>
                        <button class="delete-btn" data-id="${file.id}">删除</button>
                    </div>
                `;
                
                localMusicList.appendChild(item);
            });
            
            // 添加事件监听
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.getAttribute('data-id'));
                    const musicFile = localMusicFiles.find(file => file.id === id);
                    if (musicFile) {
                        playLocalMusic(musicFile);
                    }
                });
            });
            
            // 添加"设为奖励音乐"按钮的事件监听
            document.querySelectorAll('.set-reward-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.getAttribute('data-id'));
                    const musicFile = localMusicFiles.find(file => file.id === id);
                    if (musicFile) {
                        setRewardMusic(musicFile);
                    }
                });
            });
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.getAttribute('data-id'));
                    deleteLocalMusic(id);
                });
            });
        }
        
        // 保存本地音乐到本地存储
        function saveLocalMusicToStorage() {
            // 注意：我们无法直接存储File对象，所以只存储文件名和URL
            const musicData = localMusicFiles.map(file => ({
                id: file.id,
                name: file.name,
                url: file.url
            }));
            
            localStorage.setItem('localMusicFiles', JSON.stringify(musicData));
        }
        
        // 从本地存储加载本地音乐
        function loadLocalMusicFromStorage() {
            const storedMusic = localStorage.getItem('localMusicFiles');
            if (storedMusic) {
                try {
                    const musicData = JSON.parse(storedMusic);
                    localMusicFiles = musicData;
                    updateLocalMusicList();
                } catch (e) {
                    console.error('加载本地音乐失败:', e);
                }
            }
        }
        
        // 加载设置
        function loadSettings() {
            studyDuration = parseInt(studyTimeInput.value) * 60; // 转换为秒
            minInterval = parseInt(minIntervalInput.value) * 60;
            maxInterval = parseInt(maxIntervalInput.value) * 60;
            rewardProbability = parseInt(rewardProbabilityInput.value);
            totalSeconds = studyDuration;
            remainingSeconds = studyDuration;
            
            // 更新奖励概率显示
            rewardChanceDisplay.textContent = `${rewardProbability}%`;
        }
        
        // 开始学习
        function startStudy() {
            if (isRunning) return;
            
            loadSettings();
            isRunning = true;
            isPaused = false;
            elapsedSeconds = 0;
            reminderCount = 0;
            rewardCount = 0;
            
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            resetBtn.disabled = false;
            
            statusDisplay.textContent = '学习进行中...';
            statusDisplay.style.background = '#e8f4fd';
            statusDisplay.style.color = '#2980b9';
            
            // 设置第一个提醒
            setNextReminder();
            
            // 开始主计时器
            timer = setInterval(updateTimer, 1000);
            
            // 开始播放背景音乐（循环播放）
            backgroundMusic.loop = true;
            backgroundMusic.play().catch(e => {
                console.error("自动播放失败:", e);
                audioStatus.textContent = '点击"播放音乐"按钮开始播放';
            });
            
            showNotification('学习开始！专注90分钟');
        }
        
        // 暂停/继续
        function togglePause() {
            if (!isRunning) return;
            
            if (isPaused) {
                // 继续
                isPaused = false;
                pauseBtn.textContent = '暂停';
                statusDisplay.textContent = '学习进行中...';
                timer = setInterval(updateTimer, 1000);
                
                // 继续播放背景音乐
                backgroundMusic.play();
                
                showNotification('继续学习');
            } else {
                // 暂停
                isPaused = true;
                pauseBtn.textContent = '继续';
                statusDisplay.textContent = '已暂停';
                clearInterval(timer);
                
                // 暂停音乐
                backgroundMusic.pause();
                
                showNotification('学习已暂停');
            }
        }
        
        // 重置
        function resetStudy() {
            clearInterval(timer);
            isRunning = false;
            isPaused = false;
            
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            resetBtn.disabled = true;
            pauseBtn.textContent = '暂停';
            
            statusDisplay.textContent = '准备开始学习';
            statusDisplay.style.background = '#e8f4fd';
            statusDisplay.style.color = '#2980b9';
            
            reminderDisplay.classList.remove('active');
            reminderDisplay.classList.remove('reward');
            
            // 停止音乐
            backgroundMusic.pause();
            backgroundMusic.currentTime = 0;
            rewardMusic.pause();
            rewardMusic.currentTime = 0;
            audioStatus.textContent = '音乐已停止';
            playAudioBtn.disabled = false;
            pauseAudioBtn.disabled = true;
            
            loadSettings();
            updateDisplay();
        }
        
        // 更新计时器
        function updateTimer() {
            if (isPaused) return;
            
            elapsedSeconds++;
            remainingSeconds = totalSeconds - elapsedSeconds;
            
            // 检查是否到达提醒时间
            if (elapsedSeconds >= nextReminderTime && !reminderDisplay.classList.contains('active')) {
                triggerReminder();
            }
            
            // 检查学习是否结束
            if (remainingSeconds <= 0) {
                endStudy();
                return;
            }
            
            updateDisplay();
        }
        
        // 更新显示
        function updateDisplay() {
            // 更新计时器显示
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 更新进度条
            const progress = (elapsedSeconds / totalSeconds) * 100;
            progressBar.style.width = `${progress}%`;
            
            // 更新统计信息
            const elapsedMinutes = Math.floor(elapsedSeconds / 60);
            const elapsedSecs = elapsedSeconds % 60;
            elapsedTimeDisplay.textContent = `${elapsedMinutes.toString().padStart(2, '0')}:${elapsedSecs.toString().padStart(2, '0')}`;
            reminderCountDisplay.textContent = reminderCount;
            rewardCountDisplay.textContent = rewardCount;
        }
        
        // 设置下一个提醒时间
        function setNextReminder() {
            const randomInterval = Math.floor(Math.random() * (maxInterval - minInterval + 1)) + minInterval;
            nextReminderTime = elapsedSeconds + randomInterval;
        }
        
        // 触发提醒
        function triggerReminder() {
            reminderCount++;
            
            // 判断是否触发奖励休息
            const isReward = Math.random() * 100 < rewardProbability;
            const restTime = isReward ? 35000 : 10000; // 奖励休息35秒，普通休息10秒
            
            if (isReward) {
                rewardCount++;
                reminderDisplay.classList.add('reward');
                reminderDisplay.textContent = '🎉 恭喜获得奖励休息35秒！';
                statusDisplay.textContent = '奖励休息35秒钟...';
                statusDisplay.style.background = 'linear-gradient(to right, #ff9a9e, #fad0c4)';
                statusDisplay.style.color = '#d63031';
                
                // 保存当前背景音乐状态
                currentBackgroundMusic = {
                    src: backgroundMusic.src,
                    currentTime: backgroundMusic.currentTime
                };
                
                // 播放奖励音乐
                backgroundMusic.pause();
                rewardMusic.currentTime = 0;
                rewardMusic.play();
                audioStatus.textContent = '奖励音乐播放中';
                
                showNotification('恭喜！获得奖励休息35秒！', true);
            } else {
                reminderDisplay.classList.remove('reward');
                reminderDisplay.textContent = '👀 请闭眼休息10秒钟...';
                statusDisplay.textContent = '休息10秒钟...';
                statusDisplay.style.background = '#fff3cd';
                statusDisplay.style.color = '#856404';
                
                // 暂停背景音乐（普通休息不放音乐）
                backgroundMusic.pause();
                audioStatus.textContent = '休息中，音乐已暂停';
                
                showNotification('请闭眼休息10秒钟');
            }
            
            reminderDisplay.classList.add('active');
            
            // 设置休息结束后的回调
            setTimeout(() => {
                reminderDisplay.classList.remove('active');
                reminderDisplay.classList.remove('reward');
                statusDisplay.textContent = '学习进行中...';
                statusDisplay.style.background = '#e8f4fd';
                statusDisplay.style.color = '#2980b9';
                
                // 停止奖励音乐
                rewardMusic.pause();
                rewardMusic.currentTime = 0;
                
                // 恢复背景音乐（循环播放）
                if (isRunning && !isPaused) {
                    if (isReward && currentBackgroundMusic) {
                        // 如果是奖励休息，恢复原来的背景音乐
                        backgroundMusic.src = currentBackgroundMusic.src;
                        backgroundMusic.currentTime = currentBackgroundMusic.currentTime;
                    }
                    backgroundMusic.loop = true;
                    backgroundMusic.play();
                    audioStatus.textContent = '正在播放';
                }
                
                // 设置下一个提醒
                setNextReminder();
            }, restTime);
        }
        
        // 结束学习
        function endStudy() {
            clearInterval(timer);
            isRunning = false;
            
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            resetBtn.disabled = false;
            
            statusDisplay.textContent = '学习完成！休息20分钟';
            statusDisplay.style.background = '#d4edda';
            statusDisplay.style.color = '#155724';
            
            // 暂停音乐
            backgroundMusic.pause();
            rewardMusic.pause();
            audioStatus.textContent = '学习完成，音乐已暂停';
            
            showNotification('学习完成！开始20分钟休息');
            
            // 20分钟后提醒休息结束
            setTimeout(() => {
                showNotification('休息结束！准备开始新的学习周期');
                statusDisplay.textContent = '休息结束，可以开始新的学习';
            }, 20 * 60 * 1000);
        }
        
        // 显示通知
        function showNotification(message, isReward = false) {
            notification.textContent = message;
            notification.className = 'notification';
            
            if (isReward) {
                notification.classList.add('reward');
            }
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // 事件监听
        startBtn.addEventListener('click', startStudy);
        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', resetStudy);
        
        // 设置更改时重新加载
        studyTimeInput.addEventListener('change', loadSettings);
        minIntervalInput.addEventListener('change', loadSettings);
        maxIntervalInput.addEventListener('change', loadSettings);
        rewardProbabilityInput.addEventListener('change', loadSettings);
        
        // 初始化应用
        initialize();
    </script>
</body>
</html>
